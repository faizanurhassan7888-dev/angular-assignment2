<article
  class="band-card"
  [ngClass]="{
    'metal-theme': band.genre === 'Metal',
    'rock-theme': band.genre === 'Rock'
  }"
  [ngStyle]="{ 'border-color': getBorderColor() }"
>
  <div class="card-top">
    <div>
      <p class="genre-label">{{ band.genre }}</p>
      <h2>{{ band.name | uppercase }}</h2>
    </div>

    <span *ngIf="band.isBooked" class="sold-out-badge">Sold Out</span>
  </div>

  <div class="detail-row">
    <span>Next Show</span>
    <strong>{{ band.nextShowDate | date: 'MM/dd/yy' }}</strong>
  </div>

  <div class="detail-row">
    <span>Ticket Price</span>
    <strong>{{ band.ticketPrice | currency: 'USD' }}</strong>
  </div>

  <div class="detail-row">
    <span>Status</span>
    <strong>{{ band.isBooked ? 'Booked' : 'Available' }}</strong>
  </div>

  <button type="button" (click)="onDelete()">Remove</button>
</article>
